<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Agenda · Família Cardoso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde: #1D9E75;
      --verde-claro: #E1F5EE;
      --verde-escuro: #085041;
      --verde-medio: #0F6E56;
      --creme: #F8F6F1;
      --texto: #1e1e1c;
      --texto-suave: #5F5E5A;
      --borda: #D3D1C7;
      --card-bg: #ffffff;
      --whats: #25D366;
      --whats-hover: #1aab52;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--creme);
      color: var(--texto);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--verde-escuro);
      padding: 2rem 1.25rem 3.5rem;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      bottom: -40px;
      left: 0;
      right: 0;
      height: 80px;
      background: var(--creme);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }

    .header-inner { position: relative; z-index: 1; }

    .family-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #9FE1CB;
      font-weight: 500;
      margin-bottom: 0.75rem;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: #ffffff;
      line-height: 1.15;
      letter-spacing: -0.5px;
    }

    header h1 span {
      color: #5DCAA5;
    }

    header p {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
      font-weight: 300;
    }

    /* SEARCH */
    .search-wrap {
      padding: 0 1.25rem;
      margin-top: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 14px;
      border: 1.5px solid var(--borda);
      padding: 0 1rem;
      gap: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      transition: border-color 0.2s;
    }

    .search-box:focus-within { border-color: var(--verde); }

    .search-icon {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--texto-suave);
      stroke-width: 2;
      stroke-linecap: round;
      flex-shrink: 0;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 0.85rem 0;
      background: transparent;
      color: var(--texto);
    }

    .search-box input::placeholder { color: #B4B2A9; }

    .clear-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--texto-suave);
      display: none;
      align-items: center;
      font-size: 1rem;
      line-height: 1;
    }

    /* STATS BAR */
    .stats-bar {
      padding: 0 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stats-count {
      font-size: 0.8rem;
      color: var(--texto-suave);
    }

    .stats-count strong {
      color: var(--verde-escuro);
      font-weight: 500;
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--borda);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 0.75rem;
      color: var(--verde-medio);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s;
    }

    .refresh-btn:hover { background: var(--verde-claro); }

    .refresh-icon { width: 13px; height: 13px; stroke: var(--verde); stroke-width: 2.5; fill: none; }

    /* GRUPOS ALFABÉTICOS */
    .group-label {
      padding: 0.4rem 1.25rem;
      font-size: 0.72rem;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--verde-medio);
      font-weight: 500;
      background: var(--creme);
    }

    /* LISTA */
    .contacts-list {
      padding: 0 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 2rem;
    }

    .contact-card {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--borda);
      padding: 1rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: transform 0.15s, box-shadow 0.15s;
      animation: fadeIn 0.3s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .contact-card:active { transform: scale(0.98); }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--verde-claro);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: var(--verde-escuro);
      flex-shrink: 0;
      font-family: 'Playfair Display', serif;
      text-transform: uppercase;
    }

    .contact-info { flex: 1; min-width: 0; }

    .contact-info h3 {
      font-size: 0.95rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--texto);
    }

    .contact-info p {
      font-size: 0.82rem;
      color: var(--texto-suave);
      margin-top: 2px;
      font-weight: 300;
    }

    .whats-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--whats);
      color: #fff;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }

    .whats-btn:active { background: var(--whats-hover); transform: scale(0.93); }

    .whats-btn svg { width: 22px; height: 22px; fill: #fff; }

    /* ESTADO DE LOADING / ERRO / VAZIO */
    .state-msg {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--texto-suave);
    }

    .state-msg svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.35; }

    .state-msg p { font-size: 0.9rem; line-height: 1.6; }

    .state-msg strong { color: var(--verde-escuro); display: block; font-size: 1rem; margin-bottom: 0.35rem; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--verde-claro);
      border-top-color: var(--verde);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* STATUS DE SYNC */
    .sync-status {
      font-size: 0.72rem;
      color: var(--texto-suave);
      padding: 0.35rem 1.25rem;
      opacity: 0.7;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: #B4B2A9;
      border-top: 1px solid var(--borda);
      margin-top: 1rem;
    }

    footer span { color: var(--verde-medio); }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="family-badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      Família Cardoso
    </div>
    <h1>Nossa <span>Agenda</span></h1>
    <p>Todos os contatos da família em um só lugar</p>
  </div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
    </svg>
    <input type="search" id="searchInput" placeholder="Buscar pelo nome..." autocomplete="off" />
    <button class="clear-btn" id="clearBtn" aria-label="Limpar busca">✕</button>
  </div>
</div>

<div class="stats-bar">
  <span class="stats-count" id="statsCount">Carregando...</span>
  <button class="refresh-btn" onclick="loadContacts()" title="Atualizar dados">
    <svg class="refresh-icon" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5"/></svg>
    Atualizar
  </button>
</div>

<div id="contactsContainer"></div>

<div class="sync-status" id="syncStatus"></div>

<footer>
  Agenda da <span>Família Cardoso</span> · Dados sincronizados com Google Sheets
</footer>

<script>
  // ============================================================
  // URL pública do CSV (gerada pelo Google Sheets → Publicar na web)
  // ============================================================
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTAlXlYNqZF0eS2bSw-yViq0ftNGCzaMnd7L8xDk1htXnAYS6vPArVYM8ncWjP1nKF2PvFc2_KIdl-/pub?gid=0&single=true&output=csv';

  // Nomes das colunas na planilha
  const COL_NOME = 'Nome';
  const COL_TELEFONE = 'Telefone';
  const COL_WHATS = 'Link_WhatsApp';

  // ============================================================

  let allContacts = [];

  function getInitials(name) {
    const parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0][0].toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function formatPhone(raw) {
    const digits = raw.replace(/\D/g, '');
    if (digits.length === 11) {
      return `(${digits.slice(0,2)}) ${digits.slice(2,7)}-${digits.slice(7)}`;
    } else if (digits.length === 10) {
      return `(${digits.slice(0,2)}) ${digits.slice(2,6)}-${digits.slice(6)}`;
    }
    return raw;
  }

  function whatsappLink(waCol, phone) {
    if (waCol && waCol.startsWith('http')) return waCol;
    const digits = phone.replace(/\D/g, '');
    const num = digits.startsWith('55') ? digits : '55' + digits;
    return `https://wa.me/${num}`;
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];

    const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
    const iNome = headers.findIndex(h => h.toLowerCase() === COL_NOME.toLowerCase());
    const iTel  = headers.findIndex(h => h.toLowerCase() === COL_TELEFONE.toLowerCase());
    const iWa   = headers.findIndex(h => h.toLowerCase() === COL_WHATS.toLowerCase());

    if (iNome === -1 || iTel === -1) {
      console.error('Colunas não encontradas. Cabeçalhos detectados:', headers);
      return null;
    }

    const contacts = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',').map(c => c.replace(/^"|"$/g, '').trim());
      const nome = cols[iNome] || '';
      const tel  = cols[iTel]  || '';
      const wa   = iWa !== -1 ? (cols[iWa] || '') : '';
      if (nome && tel) contacts.push({ nome, telefone: tel, whatsapp: wa });
    }
    return contacts;
  }

  function renderContacts(contacts) {
    const container = document.getElementById('contactsContainer');
    const statsEl = document.getElementById('statsCount');

    if (!contacts.length) {
      container.innerHTML = `
        <div class="state-msg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <p><strong>Nenhum contato encontrado</strong>Tente buscar por outro nome.</p>
        </div>`;
      statsEl.textContent = 'Nenhum resultado';
      return;
    }

    // Agrupa por letra inicial
    const groups = {};
    contacts.forEach(c => {
      const letra = c.nome[0].toUpperCase();
      if (!groups[letra]) groups[letra] = [];
      groups[letra].push(c);
    });

    const sortedLetras = Object.keys(groups).sort();
    let html = '';

    sortedLetras.forEach(letra => {
      html += `<div class="group-label">${letra}</div>`;
      html += `<div class="contacts-list">`;
      groups[letra].forEach((c, i) => {
        const initials = getInitials(c.nome);
        const phone = formatPhone(c.telefone);
        const waLink = whatsappLink(c.whatsapp, c.telefone);
        html += `
          <div class="contact-card" style="animation-delay:${i * 40}ms">
            <div class="avatar">${initials}</div>
            <div class="contact-info">
              <h3>${escapeHtml(c.nome)}</h3>
              <p>${escapeHtml(phone)}</p>
            </div>
            <a href="${escapeHtml(waLink)}" class="whats-btn" target="_blank" rel="noopener" aria-label="Abrir WhatsApp de ${escapeHtml(c.nome)}">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
              </svg>
            </a>
          </div>`;
      });
      html += `</div>`;
    });

    container.innerHTML = html;
    const total = contacts.length;
    statsEl.innerHTML = `<strong>${total}</strong> contato${total !== 1 ? 's' : ''}`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showLoading() {
    document.getElementById('contactsContainer').innerHTML = `
      <div class="state-msg">
        <div class="spinner"></div>
        <p>Buscando contatos...</p>
      </div>`;
    document.getElementById('statsCount').textContent = 'Carregando...';
  }

  function showError(msg) {
    document.getElementById('contactsContainer').innerHTML = `
      <div class="state-msg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/>
        </svg>
        <p><strong>Não foi possível carregar</strong>${msg}</p>
      </div>`;
    document.getElementById('statsCount').textContent = 'Erro ao carregar';
  }

  async function loadContacts() {
    showLoading();
    document.getElementById('syncStatus').textContent = '';

    try {
      const res = await fetch(CSV_URL + '&t=' + Date.now());
      if (!res.ok) throw new Error('Planilha inacessível (HTTP ' + res.status + ')');

      const text = await res.text();
      const contacts = parseCSV(text);

      if (contacts === null) {
        showError(`Verifique se a planilha tem colunas chamadas "${COL_NOME}" e "${COL_TELEFONE}".`);
        return;
      }

      allContacts = contacts.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
      renderContacts(allContacts);

      const now = new Date();
      document.getElementById('syncStatus').textContent =
        `Última atualização: ${now.toLocaleDateString('pt-BR')} às ${now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}`;

    } catch (err) {
      console.error(err);
      if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
        showError('Verifique se a planilha está <strong>publicada na web</strong> (Arquivo → Compartilhar → Publicar na web → CSV).');
      } else {
        showError(err.message);
      }
    }
  }

  // BUSCA
  const searchInput = document.getElementById('searchInput');
  const clearBtn = document.getElementById('clearBtn');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    clearBtn.style.display = q ? 'flex' : 'none';

    if (!q) {
      renderContacts(allContacts);
      return;
    }

    const filtered = allContacts.filter(c =>
      c.nome.toLowerCase().includes(q)
    );
    renderContacts(filtered);
  });

  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    clearBtn.style.display = 'none';
    renderContacts(allContacts);
    searchInput.focus();
  });

  // Inicia
  loadContacts();
</script>

</body>
</html>
